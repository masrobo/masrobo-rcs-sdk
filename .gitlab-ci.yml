stages:
  - publish
  - notice

publish-python:
  stage: publish
  before_script:
    - pip install build twine
  script:
    - pip install -r requirements.txt
    - python -m build --version
    - python -m build python/
    - twine check python/dist/*
    - twine upload python/dist/* -u $PYPI_USERNAME -p $PYPI_PASSWORD
  only:
    - master

publish-java:
  stage: publish
  script:
    - echo "Publishing Java SDK..."
    # 在这里添加发布 Java SDK 的命令，例如使用 Gradle 或 Maven 发布到 Maven Central
  only:
    - master

publish-nodejs:
  stage: publish
  script:
    - echo "Publishing Node.js SDK..."
    # 在这里添加发布 Node.js SDK 的命令，例如使用 npm 或 yarn 发布到 npmjs.org
  only:
    - master

notice:
  stage: notice
  script:
    - chmod +x scripts/notice.sh
    - ./scripts/notice.sh
  only:
    - master